<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor Hub</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="home" id="home">

        <h1>EDITOR HUB</h1>

        <p>
            Conectando clientes e editores.
        </p>

        <div class="buttons">

            <button class="btn" onclick="abrirEditor()">
                🔎 Procurar Editor
            </button>

            <button class="btn" onclick="abrirCliente()">
                💼 Procurar Cliente
            </button>

        </div>

    </div>

    <div class="form-card hidden" id="editorForm">

        <h2>🔎 Procurando Editor</h2>

        <form onsubmit="enviarEditor(event)">

            <input type="text" id="editorNome" placeholder="Seu nome" required>

            <input type="text" id="editorDiscord" placeholder="Discord" required>

            <input type="text" id="editorTipo" placeholder="Tipo de edição" required>

            <input type="text" id="editorPrazo" placeholder="Prazo" required>

            <input type="text" id="editorOrcamento" placeholder="Orçamento" required>

            <textarea id="editorInfo" placeholder="Informações adicionais"></textarea>

            <button class="btn" type="submit">
                Enviar Pedido
            </button>

            <button class="btn voltar" type="button" onclick="voltarHome()">
                Voltar
            </button>

        </form>

    </div>

    <div class="form-card hidden" id="clienteForm">

        <h2>💼 Procurando Cliente</h2>

        <form onsubmit="enviarCliente(event)">

            <input type="text" id="clienteNome" placeholder="Seu nome" required>

            <input type="text" id="clienteDiscord" placeholder="Discord" required>

            <input type="text" id="clienteTipo" placeholder="Tipo de edição" required>

            <input type="text" id="clientePrograma" placeholder="Programa utilizado" required>

            <input type="text" id="clientePortfolio" placeholder="Portfólio">

            <input type="text" id="clientePreco" placeholder="Preço" required>

            <textarea id="clienteInfo" placeholder="Informações adicionais"></textarea>

            <button class="btn" type="submit">
                Enviar Pedido
            </button>

            <button class="btn voltar" type="button" onclick="voltarHome()">
                Voltar
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
